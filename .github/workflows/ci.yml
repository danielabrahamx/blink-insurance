name: CI

on:
  push:
    branches: [main, v2-browser-demo]
  pull_request:
    branches: [main]

# Cloudsmith access for @circlefin/x402-batching is required by both
# frontend and backend installs. Set CLOUDSMITH_TOKEN as a repo secret;
# the .npmrc files at repo root and in each workspace already reference
# ${CLOUDSMITH_TOKEN}.
env:
  CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}

jobs:
  frontend:
    name: frontend (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  backend:
    name: backend (install + syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Syntax check
        run: node --check server.js
